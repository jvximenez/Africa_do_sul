<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --bg:#0c0c13; --surface:#121219; --card:#191923; --card-hover:#1f1f2c;
  --border:rgba(255,255,255,0.06); --border-md:rgba(255,255,255,0.11);
  --text:#ede9e2; --text-soft:#a09caf; --muted:#5e5a6e;
  --accent:#c9a96e; --accent-glow:rgba(201,169,110,0.15); --accent-dim:rgba(201,169,110,0.08);
  --c-safari:#e07040; --c-capetown:#5b9fd4; --c-garden:#52b788; --c-extra:#c9a96e;
  --sidebar:300px; --radius:10px;
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --shine: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.06) 45%, transparent 55%);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { height:100%; -webkit-text-size-adjust:100%; }
body {
  height:100%; min-height:100vh; min-height:100dvh;
  overflow:hidden;
  color:var(--text);
  font-family:'DM Sans',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:rgba(201,169,110,0.12);
  background:
    radial-gradient(120% 70% at 8% -10%, rgba(201,169,110,0.07), transparent 52%),
    radial-gradient(90% 55% at 100% 110%, rgba(91,159,212,0.06), transparent 48%),
    var(--bg);
}

#app {
  display:flex; width:100%; height:100%;
  min-height:0;
}

/* SIDEBAR */
#sidebar {
  width:var(--sidebar); min-width:var(--sidebar);
  display:flex; flex-direction:column;
  background:var(--surface);
  border-right:1px solid var(--border);
  overflow:hidden; height:100%;
  min-height:0;
  padding-left:env(safe-area-inset-left);
}

/* MAP */
#map-wrap {
  flex:1; position:relative; overflow:hidden; height:100%;
  min-height:0;
  padding-right:env(safe-area-inset-right);
}
#map {
  width:100%; height:100%; background:#0a0a10;
  box-shadow:inset 0 0 120px rgba(0,0,0,0.45);
}

/* HEADER */
#hdr {
  position:relative;
  padding:calc(16px + env(safe-area-inset-top)) 18px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  overflow:hidden;
}
#hdr::before {
  content:''; position:absolute; inset:0; pointer-events:none; opacity:0.35;
  background:
    linear-gradient(135deg, rgba(224,112,64,0.2) 0%, transparent 42%),
    linear-gradient(225deg, rgba(91,159,212,0.18) 0%, transparent 45%),
    linear-gradient(315deg, rgba(82,183,136,0.12) 0%, transparent 40%);
}
#hdr > * { position:relative; z-index:1; }
.eyebrow { font-size:10px; font-weight:500; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
#hdr h1 { font-family:'Cormorant Garamond',Georgia,serif; font-size:clamp(22px, 4.5vw, 26px); font-weight:400; line-height:1.15; }
#hdr h1 em { font-style:italic; color:var(--accent); }
.meta { display:flex; gap:8px; margin-top:10px; }
.stat {
  text-align:center; flex:1; background:var(--card); border-radius:6px; padding:6px 4px;
  border:1px solid transparent; transition:border-color 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out);
}
.stat:hover { border-color:var(--border-md); box-shadow:0 0 0 1px var(--accent-dim); }
.stat .val { font-size:16px; font-weight:500; font-family:'Cormorant Garamond',serif; color:var(--accent); }
.stat .key { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-top:1px; }

/* TABS */
.tabs {
  display:flex; border-bottom:1px solid var(--border); padding:0 6px; flex-shrink:0;
  gap:2px;
}
.tab {
  flex:1; background:none; border:none; color:var(--muted);
  font-family:'DM Sans',sans-serif; font-size:11px; font-weight:500; letter-spacing:0.6px;
  text-transform:uppercase; padding:12px 4px; cursor:pointer; position:relative;
  transition:color 0.2s var(--ease-out); border-radius:6px 6px 0 0;
}
.tab:hover { color:var(--text-soft); }
.tab.on { color:var(--accent); }
.tab.on::after { content:''; position:absolute; bottom:-1px; left:10%; right:10%; height:2px; background:var(--accent); border-radius:2px 2px 0 0; }
.tab:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }

/* PANES */
.pane { display:none; flex:1; overflow-y:auto; min-height:0; scroll-behavior:smooth; -webkit-overflow-scrolling:touch; }
.pane.on { display:block; }
.pane::-webkit-scrollbar { width:4px; }
.pane::-webkit-scrollbar-thumb { background:var(--border-md); border-radius:2px; }

/* GERAL */
.g-phase { font-size:9px; font-weight:500; letter-spacing:1.1px; text-transform:uppercase; color:var(--muted); padding:14px 18px 6px; display:flex; align-items:center; gap:6px; }
.g-phase::before { content:''; width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.g-phase.safari::before { background:var(--c-safari); }
.g-phase.capetown::before { background:var(--c-capetown); }
.g-phase.garden::before { background:var(--c-garden); }
.g-phase.extra::before { background:var(--c-extra); }
.g-row {
  display:flex; align-items:center; gap:10px; padding:9px 18px; cursor:pointer;
  transition:background 0.18s var(--ease-out), transform 0.18s var(--ease-out);
  border-radius:0 4px 4px 0; margin-right:6px;
}
.g-row:hover { background:var(--card); }
.g-row:active { transform:scale(0.992); }
.g-row.on { background:var(--accent-dim); border-right:2px solid var(--accent); }
.g-row:focus-visible { outline:2px solid var(--accent); outline-offset:-2px; }
.g-row .num { font-size:10px; color:var(--muted); width:42px; flex-shrink:0; }
.g-row .body { flex:1; min-width:0; }
.g-row .ttl { font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.g-row .dt { font-size:10px; color:var(--muted); margin-top:1px; }
.g-row .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; box-shadow:0 0 0 2px rgba(0,0,0,0.25); }
.g-thumb-wrap {
  width:44px; height:44px; border-radius:10px; overflow:hidden; flex-shrink:0;
  border:1px solid var(--border-md); box-shadow:0 4px 14px rgba(0,0,0,0.35);
}
.g-thumb { width:100%; height:100%; object-fit:cover; display:block; transform:scale(1.02); transition:transform 0.35s var(--ease-out); }
.g-row:hover .g-thumb { transform:scale(1.08); }

/* DIAS */
.d-pills {
  display:flex; flex-wrap:wrap; gap:6px; padding:12px 14px; border-bottom:1px solid var(--border);
  position:sticky; top:0; background:rgba(18,18,25,0.92); backdrop-filter:blur(8px); z-index:2;
}
.pill {
  font-size:10px; font-weight:500; padding:6px 11px; border-radius:20px; border:1px solid var(--border-md);
  background:transparent; color:var(--muted); cursor:pointer;
  transition:border-color 0.2s, background 0.2s, color 0.2s, transform 0.15s var(--ease-out);
  font-family:'DM Sans',sans-serif;
}
.pill:hover { border-color:var(--accent); color:var(--text-soft); }
.pill.on { background:var(--accent); border-color:var(--accent); color:#0c0c13; font-weight:600; }
.pill:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
.pill:active { transform:scale(0.96); }
.d-detail { padding:0 0 22px; animation:fadeIn 0.45s var(--ease-out); }
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

.d-hero {
  position:relative; margin:-2px 0 18px; min-height:168px; max-height:220px;
  border-radius:0 0 var(--radius) var(--radius); overflow:hidden;
}
.d-hero::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:3px; z-index:3;
  background:linear-gradient(90deg, var(--c-safari), var(--c-capetown), var(--c-garden), var(--accent));
  pointer-events:none;
}
.d-hero-img {
  width:100%; height:clamp(168px, 28vw, 220px); object-fit:cover; display:block;
  filter:saturate(1.05) contrast(1.02);
}
.d-hero-scrim {
  position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(12,12,19,0.1) 0%, rgba(12,12,19,0.55) 55%, rgba(12,12,19,0.92) 100%);
  pointer-events:none;
}
.d-hero-text {
  position:absolute; left:0; right:0; bottom:0; padding:16px 18px 18px;
}
.d-hero .d-phase-tag { color:rgba(255,255,255,0.85)!important; margin-bottom:5px; text-shadow:0 1px 8px rgba(0,0,0,0.6); }
.d-hero .d-phase-tag span { box-shadow:0 0 0 2px rgba(255,255,255,0.2)!important; }
.d-hero .d-ttl {
  color:#fff; font-size:clamp(22px, 5vw, 28px); text-shadow:0 2px 20px rgba(0,0,0,0.5);
  margin-bottom:4px;
}
.d-hero .d-date { color:rgba(255,255,255,0.72); text-shadow:0 1px 6px rgba(0,0,0,0.5); }
.d-hero .d-note { color:rgba(237,233,226,0.88); font-style:italic; margin-top:8px; text-shadow:0 1px 8px rgba(0,0,0,0.6); }

.d-detail-body { padding:0 18px; }
.d-detail-top { margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--border); }
.d-phase-tag { font-size:9px; font-weight:500; letter-spacing:0.8px; text-transform:uppercase; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.d-ttl { font-family:'Cormorant Garamond',Georgia,serif; font-size:21px; font-weight:400; line-height:1.2; margin-bottom:2px; }
.d-date { font-size:11px; color:var(--muted); }
.d-note { font-size:11px; color:var(--text-soft); font-style:italic; margin-top:6px; line-height:1.45; }
.pcard {
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  margin-bottom:12px; cursor:pointer; overflow:hidden;
  transition:border-color 0.25s var(--ease-out), background 0.25s, box-shadow 0.25s var(--ease-out), transform 0.2s var(--ease-out);
}
.pcard:hover { background:var(--card-hover); border-color:var(--border-md); transform:translateY(-2px); box-shadow:0 12px 32px rgba(0,0,0,0.35); }
.pcard.on { border-color:var(--accent); background:var(--accent-dim); box-shadow:0 0 0 1px var(--accent-dim), 0 16px 40px rgba(0,0,0,0.25); }
.pcard:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
.pcard-visual { position:relative; aspect-ratio:16/9; max-height:200px; background:#0a0a10; }
.pcard-img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.5s var(--ease-out), filter 0.3s; }
.pcard:hover .pcard-img { transform:scale(1.04); filter:brightness(1.06); }
.pcard-visual::after {
  content:''; position:absolute; inset:0; pointer-events:none; opacity:0;
  background:var(--shine); transition:opacity 0.4s;
}
.pcard:hover .pcard-visual::after { opacity:1; }
.pcard-phase-bar { height:3px; width:100%; flex-shrink:0; }
.pcard-in { padding:12px 14px 14px; }
.pcard .pname { font-size:13px; font-weight:500; display:flex; align-items:center; gap:6px; margin-bottom:5px; }
.pcard .pinfo { font-size:11px; color:var(--muted); padding-left:11px; line-height:1.45; }
.pcard-enlarge {
  position:absolute; bottom:8px; right:8px; width:36px; height:36px; border-radius:50%;
  border:1px solid rgba(255,255,255,0.35); background:rgba(12,12,19,0.65); backdrop-filter:blur(6px);
  color:#fff; font-size:16px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:transform 0.15s, background 0.2s, border-color 0.2s; z-index:2;
}
.pcard-enlarge:hover { background:rgba(201,169,110,0.35); border-color:var(--accent); transform:scale(1.06); }
.pcard-enlarge:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }

/* LISTA */
.l-section { font-size:9px; font-weight:500; letter-spacing:1.1px; text-transform:uppercase; color:var(--muted); padding:14px 18px 6px; display:flex; align-items:center; gap:6px; }
.l-section::before { content:''; width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.l-section.safari::before { background:var(--c-safari); }
.l-section.capetown::before { background:var(--c-capetown); }
.l-section.garden::before { background:var(--c-garden); }
.l-section.extra::before { background:var(--c-extra); }
.l-item {
  display:flex; align-items:flex-start; gap:12px; padding:11px 18px; border-bottom:1px solid var(--border);
  cursor:pointer; transition:background 0.18s var(--ease-out);
}
.l-item:hover { background:var(--card); }
.l-item:focus-visible { outline:2px solid var(--accent); outline-offset:-4px; }
.l-thumb {
  width:56px; height:56px; border-radius:12px; object-fit:cover; flex-shrink:0;
  border:1px solid var(--border-md); box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.l-dot { width:6px; height:6px; border-radius:50%; margin-top:5px; flex-shrink:0; }
.l-name { font-size:12px; line-height:1.35; }
.l-meta { font-size:10px; color:var(--muted); margin-top:3px; line-height:1.4; }

/* MAP BUTTONS */
.map-btn {
  position:absolute; z-index:1000;
  background:rgba(18,18,25,0.94); backdrop-filter:blur(8px);
  border:1px solid var(--border-md); color:var(--text-soft);
  font-size:11px; font-family:'DM Sans',sans-serif; font-weight:500;
  padding:9px 15px; border-radius:22px; cursor:pointer;
  transition:color 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.15s var(--ease-out);
  top:calc(14px + env(safe-area-inset-top)); right:calc(14px + env(safe-area-inset-right));
}
.map-btn:hover { color:var(--text); border-color:var(--accent); box-shadow:0 4px 20px rgba(0,0,0,0.35); }
.map-btn:focus-visible { outline:2px solid var(--accent); outline-offset:3px; }
.map-btn:active { transform:scale(0.97); }

/* FOOTER */
.site-ft {
  flex-shrink:0; padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  border-top:1px solid var(--border); text-align:center; font-size:10px; color:var(--muted); letter-spacing:0.02em;
}
.site-ft a { color:var(--text-soft); text-decoration:none; border-bottom:1px solid transparent; transition:border-color 0.15s, color 0.15s; }
.site-ft a:hover { color:var(--accent); border-bottom-color:var(--accent-dim); }

/* LEAFLET */
.leaflet-popup-content-wrapper { background:var(--card)!important; border:1px solid var(--border-md); border-radius:var(--radius)!important; box-shadow:0 12px 40px rgba(0,0,0,0.55)!important; color:var(--text)!important; }
.leaflet-popup-content { margin:12px 14px!important; }
.leaflet-popup-tip { background:var(--card)!important; }
.leaflet-control-attribution { background:rgba(12,12,19,0.82)!important; color:rgba(255,255,255,0.28)!important; font-size:9px!important; padding:2px 6px!important; border-radius:4px!important; margin:8px!important; }
.leaflet-control-attribution a { color:rgba(255,255,255,0.38)!important; }
.leaflet-route-road { stroke-linecap:round; stroke-linejoin:round; }
.leaflet-route-air { stroke-linecap:round; stroke-linejoin:round; }
.leaflet-control-zoom { border:none!important; margin:10px calc(10px + env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) 0!important; }
.leaflet-control-zoom a { background:rgba(18,18,25,0.94)!important; color:var(--text)!important; border-color:var(--border-md)!important; }
.pop-thumb {
  width:100%; height:108px; object-fit:cover; border-radius:6px; margin-bottom:10px;
  display:block; border:1px solid var(--border-md);
}
.pop-phase { font-size:9px; font-weight:500; letter-spacing:0.8px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.pop-name { font-family:'Cormorant Garamond',serif; font-size:16px; font-weight:500; margin-bottom:3px; line-height:1.2; }
.pop-info { font-size:11px; color:var(--text-soft); line-height:1.45; }
.pop-credit { font-size:9px; color:var(--muted); margin-top:8px; opacity:0.85; }
.pop-credit a { color:var(--text-soft); }

/* Lightbox */
.lightbox {
  position:fixed; inset:0; z-index:20000; background:rgba(5,5,10,0.92); backdrop-filter:blur(10px);
  display:flex; flex-direction:column; align-items:center; justify-content:center; padding:max(16px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
  cursor:zoom-out;
}
.lightbox[hidden] { display:none!important; }
.lightbox img {
  max-width:min(96vw, 1100px); max-height:78vh; width:auto; height:auto; object-fit:contain;
  border-radius:var(--radius); box-shadow:0 24px 80px rgba(0,0,0,0.65); cursor:default;
  border:1px solid var(--border-md);
}
.lightbox-cap { margin-top:14px; font-size:12px; color:var(--text-soft); text-align:center; max-width:520px; line-height:1.45; }
.lightbox-cap a { color:var(--accent); }
.lightbox-x {
  position:absolute; top:calc(12px + env(safe-area-inset-top)); right:calc(14px + env(safe-area-inset-right));
  width:44px; height:44px; border-radius:50%; border:1px solid var(--border-md); background:rgba(18,18,25,0.9);
  color:var(--text); font-size:22px; line-height:1; cursor:pointer; z-index:2;
  transition:background 0.2s, border-color 0.2s;
}
.lightbox-x:hover { border-color:var(--accent); background:var(--card-hover); }

/* Previsão (Por dia) */
.d-wx {
  display:flex; flex-wrap:wrap; align-items:center; gap:6px 10px;
  margin:0 0 10px; padding:8px 0 0;
  font-size:11px; color:var(--text-soft); line-height:1.35;
  border-top:1px solid rgba(255,255,255,0.06);
}
.d-wx .d-wx-main { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.d-wx .d-wx-ico { font-size:15px; line-height:1; }
.d-wx .d-wx-temp { font-weight:500; color:var(--text); font-variant-numeric:tabular-nums; }
.d-wx .d-wx-meta { color:var(--muted); font-size:10px; }
.d-wx.d-wx--pending { color:var(--muted); }
.d-wx.d-wx--err { color:var(--muted); font-size:10px; }
.g-wx {
  display:inline-block; margin-left:6px; vertical-align:baseline;
  font-size:10px; color:var(--muted); font-variant-numeric:tabular-nums;
}

/* MOBILE — máximo de área útil: header enxuto, fotos baixas, paddings mínimos */
@media (max-width: 640px) {
  :root { --sidebar: 100%; --radius: 8px; }
  #app {
    flex-direction: column-reverse;
    height: 100dvh;
    min-height: -webkit-fill-available;
  }
  /* Safe area no topo do ecrã aplica-se ao mapa (faixa superior), não ao #hdr —
     que em mobile fica por baixo do mapa; inset no hdr criava faixa escura “morta”. */
  #map-wrap {
    flex: 0 0 auto;
    height: clamp(152px, 28dvh, 220px);
    max-height: 32vh;
    border-bottom: 1px solid var(--border);
    padding-right: 0;
    padding-top: env(safe-area-inset-top, 0px);
  }
  #sidebar {
    flex: 1 1 0;
    min-height: 0;

const weatherByDayId = {};

function wxEmoji(code) {
  var c = Number(code);
  if (c === 0) return '☀️';
  if (c <= 3) return '⛅';
  if (c <= 48) return '🌫️';
  if (c <= 57) return '🌦️';
  if (c <= 67) return '🌧️';
  if (c <= 77) return '🌨️';
  if (c <= 82) return '🌧️';
  if (c <= 86) return '🌨️';
  if (c <= 99) return '⛈️';
  return '☁️';
}

function wxLabelPt(code) {
  var c = Number(code);
  if (c === 0) return 'Céu limpo';
  if (c === 1) return 'Pred. limpo';
  if (c === 2) return 'Parcialmente nublado';
  if (c === 3) return 'Nublado';
  if (c <= 48) return 'Nevoeiro';
  if (c <= 57) return 'Garoa ou chuva fraca';
  if (c <= 67) return 'Chuva';
  if (c <= 77) return 'Neve';
  if (c <= 82) return 'Pancadas de chuva';
  if (c <= 86) return 'Pancadas de neve';
  if (c <= 99) return 'Trovoada';
  return 'Variável';
}

function wxBlockHtml(dayId) {
  return '<div class="d-wx d-wx--pending" data-wx-day="' + dayId + '" aria-live="polite"></div>';
}

function fetchOpenMeteoDay(day) {
  var p0 = day.pontos && day.pontos[0];
  if (!p0 || !day.wxDate) {
    weatherByDayId[day.id] = { err: true, reason: 'no-data' };
    return Promise.resolve();
  }
  var tz = day.wxTz ? encodeURIComponent(day.wxTz) : 'Africa%2FJohannesburg';
  var u = 'https://api.open-meteo.com/v1/forecast?latitude=' + encodeURIComponent(p0.lat)
    + '&longitude=' + encodeURIComponent(p0.lng)
    + '&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max'
    + '&timezone=' + tz
    + '&start_date=' + encodeURIComponent(day.wxDate)
    + '&end_date=' + encodeURIComponent(day.wxDate);
  return fetch(u)
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (j) {
      if (!j || !j.daily || !j.daily.time || j.daily.time.length === 0) {
        weatherByDayId[day.id] = { err: true, reason: 'empty' };
        return;
      }
      var i = 0;
      var wc = j.daily.weathercode[i];
      var tmax = j.daily.temperature_2m_max[i];
      var tmin = j.daily.temperature_2m_min[i];
      var pop = j.daily.precipitation_probability_max != null ? j.daily.precipitation_probability_max[i] : null;
      weatherByDayId[day.id] = {
        err: false,
        code: wc,
        emoji: wxEmoji(wc),
        label: wxLabelPt(wc),
        tmax: tmax,
        tmin: tmin,
        pop: pop,
        date: day.wxDate
      };
    })
    .catch(function () {
      weatherByDayId[day.id] = { err: true, reason: 'net' };
    });
}

function wxCompactLine(dayId) {
  var w = weatherByDayId[dayId];
  if (!w || w.err) return '';
  var hi = Math.round(w.tmax);
  var lo = Math.round(w.tmin);
  return w.emoji + ' ' + (lo === hi ? hi + '°' : lo + '–' + hi + '°');
}

function fillWxDetailEl(el, dayId) {
  if (!el) return;
  var day = DAYS.find(function (d) { return d.id === dayId; });
  var w = weatherByDayId[dayId];
  if (w === undefined) {
    el.className = 'd-wx d-wx--pending';
    el.innerHTML = '<span class="d-wx-main">Carregando previsão…</span>';
    return;
  }
  if (!w || w.err) {
    el.className = 'd-wx d-wx--err';
    el.innerHTML = '<span class="d-wx-main">Previsão indisponível (horizonte do modelo ~16 dias ou rede).</span>';
    return;
  }
  el.className = 'd-wx';
  var tmp = Math.round(w.tmin) === Math.round(w.tmax)
    ? '<span class="d-wx-temp">' + Math.round(w.tmax) + '°C</span>'
    : '<span class="d-wx-temp">' + Math.round(w.tmin) + '° / ' + Math.round(w.tmax) + '°C</span>';
  var popStr = (w.pop != null && w.pop > 0)
    ? ' · chuva máx. ' + Math.round(w.pop) + '%'
    : '';
  var dStr = day && day.wxDate ? day.wxDate : w.date;
  el.innerHTML = '<div class="d-wx-main"><span class="d-wx-ico" aria-hidden="true">' + w.emoji + '</span>' + tmp + '</div>'
    + '<span class="d-wx-meta">' + esc(w.label) + ' · ' + esc(dStr) + popStr + '</span>';
}

function applyWeatherToGeral() {
  DAYS.forEach(function (d) {
    var el = document.querySelector('.g-wx[data-g-wx="' + d.id + '"]');
    if (!el) return;
    var line = wxCompactLine(d.id);
    el.textContent = line ? line : '';
    el.title = line ? ('Previsão ' + d.wxDate + ': ' + line) : '';
  });
}

function refreshVisibleWeather() {
  applyWeatherToGeral();
  var body = document.getElementById('d-body');
  if (!body) return;
  var wxEl = body.querySelector('.d-wx[data-wx-day]');
  if (wxEl) {
    var id = parseInt(wxEl.getAttribute('data-wx-day'), 10);
    if (!isNaN(id)) fillWxDetailEl(wxEl, id);
  }
}

const map = L.map('map', { zoomControl:false }).fitBounds(SA_BOUNDS, { padding:[40,40] });

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom:19
}).addTo(map);

L.control.zoom({ position:'bottomright' }).addTo(map);

var routeLayerGroup = L.layerGroup().addTo(map);

function straightLatLngs(coords) {
  return coords.map(function (c) { return L.latLng(c[0], c[1]); });
}

function fetchOsrmDriving(coords) {
  if (coords.length < 2) return Promise.resolve(null);
  var path = coords.map(function (c) { return c[1] + ',' + c[0]; }).join(';');
  var url = 'https://router.project-osrm.org/route/v1/driving/' + encodeURI(path) + '?overview=full&geometries=geojson';
  return fetch(url).then(function (r) {
    if (!r.ok) return null;
    return r.json();
  }).then(function (j) {
    if (!j || j.code !== 'Ok' || !j.routes || !j.routes[0] || !j.routes[0].geometry) return null;
    return j.routes[0].geometry.coordinates.map(function (pt) { return [pt[1], pt[0]]; });
  }).catch(function () { return null; });
}

function addRouteLeg(leg) {
  if (leg.mode === 'fly') {
    L.polyline(straightLatLngs(leg.coords), {
      color:'rgba(130,140,185,0.42)',
      weight:2,
      dashArray:'6,10',
      lineCap:'round',
      className:'leaflet-route-air'
    }).addTo(routeLayerGroup);
    return Promise.resolve();
  }
  return fetchOsrmDriving(leg.coords).then(function (latlngs) {
    var pts = latlngs && latlngs.length >= 2 ? latlngs : leg.coords;
    L.polyline(pts, {
      color:'rgba(201,169,110,0.88)',
      weight:3,
      lineCap:'round',
      lineJoin:'round',
      className:'leaflet-route-road'
    }).addTo(routeLayerGroup);
  });
}

ROUTE_LEGS.reduce(function (p, leg) {
  return p.then(function () { return addRouteLeg(leg); });
}, Promise.resolve()).then(function () {
  map.invalidateSize();
  var el = document.getElementById('route-attrib');
  if (el) el.textContent = 'rotas: carro (OSRM) · voo (tracejado)';
});

function mkIcon(color) {
  return L.divIcon({
    className:'leaflet-marker-dot',
    html:`<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.45)"></div>`,
    iconSize:[14,14], iconAnchor:[7,7], popupAnchor:[0,-12]
  });
}

function phaseKey(day, p) {
  return (p && p.phase) || day.phase;
}

DAYS.forEach(day => {
  day.pontos.forEach(p => {
    const pk = phaseKey(day, p);
    const color = Ph[pk].color;
    const m = L.marker([p.lat, p.lng], { icon:mkIcon(color) });
    const popImg = p.img
      ? `<img class="pop-thumb" src="${escAttr(p.img)}" alt="${escAttr(p.name)}" loading="lazy" width="240" height="108"/>`
      : '';
    m.bindPopup(
      popImg +
      `<div class="pop-phase" style="color:${color}">${esc(Ph[pk].label)} · ${esc(day.label)}</div>` +
      `<div class="pop-name">${esc(p.name)}</div><div class="pop-info">${esc(p.info)}</div>` +
      `<div class="pop-credit">${PHOTO_NOTE}</div>`,
      { maxWidth:280 }
    );
    m.on('click', () => { switchTab('dias'); selectDay(day.id); });
    m.addTo(map);
  });
});

document.getElementById('btn-reset').addEventListener('click', () => {
  map.flyToBounds(SA_BOUNDS, { padding:[60,60], duration:1.2 });
});

let curDay = DAYS[0].id;
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(b => {
    const on = b.dataset.tab === tab;
    b.classList.toggle('on', on);
    b.setAttribute('aria-selected', on);
  });
  document.querySelectorAll('.pane').forEach(p => {
    const on = p.id === 'pane-' + tab;
    p.classList.toggle('on', on);
    p.hidden = !on;
  });
  const pane = document.getElementById('pane-' + tab);
  if (pane) pane.scrollTop = 0;
}
document.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));

(function() {
  const c = document.getElementById('pane-geral');
  c.innerHTML = ['safari','capetown','garden','extra'].map(ph =>
    `<div>
      <div class="g-phase ${ph}">${esc(Ph[ph].label)}</div>
      ${DAYS.filter(d => d.phase === ph).map(d => {
        const hi = d.pontos[0] && d.pontos[0].img;
        const th = hi ? `<div class="g-thumb-wrap"><img class="g-thumb" src="${escAttr(d.pontos[0].img)}" alt="" loading="lazy" width="44" height="44"/></div>` : '';
        return `<div class="g-row" data-id="${d.id}" tabindex="0" role="button">
          <span class="num">${esc(d.label)}</span>${th}
          <div class="body"><div class="ttl">${esc(d.title)}</div><div class="dt">${esc(d.date)}<span class="g-wx" data-g-wx="${d.id}"></span></div></div>
          <div class="dot" style="background:${Ph[d.phase].color}"></div>
        </div>`;
      }).join('')}
    </div>`).join('');
  c.querySelectorAll('.g-row').forEach(r => {
    const go = () => { selectDay(parseInt(r.dataset.id, 10)); };
    r.addEventListener('click', go);
    r.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(); } });
  });
})();

(function() {
  const c = document.getElementById('pane-dias');
  c.innerHTML = `<div class="d-pills">${DAYS.map(d => `<button type="button" class="pill" data-id="${d.id}">${esc(d.label)}</button>`).join('')}</div><div id="d-body"></div>`;
  c.querySelectorAll('.pill').forEach(p => p.addEventListener('click', () => selectDay(parseInt(p.dataset.id, 10))));
})();

function selectDay(id) {
  curDay = id;
  const day = DAYS.find(d => d.id === id);
  if (!day) return;
  const color = Ph[day.phase].color;

  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('on', parseInt(p.dataset.id, 10) === id));
  document.querySelectorAll('.g-row').forEach(r => r.classList.toggle('on', parseInt(r.dataset.id, 10) === id));

  const body = document.getElementById('d-body');
  if (body) {
    const hero = day.pontos[0] && day.pontos[0].img ? day.pontos[0].img : '';
    body.innerHTML = `<div class="d-detail">
      ${hero ? `<div class="d-hero">
        <img class="d-hero-img" src="${escAttr(hero)}" alt="" loading="eager" fetchpriority="high" width="900" height="400"/>
        <div class="d-hero-scrim"></div>
        <div class="d-hero-text">
          <div class="d-phase-tag" style="color:${color}">
            <span style="width:5px;height:5px;border-radius:50%;background:${color};display:inline-block"></span>
            ${esc(Ph[day.phase].label)}
          </div>
          <div class="d-ttl">${esc(day.title)}</div>
          <div class="d-date">${esc(day.date)}</div>
          ${day.note ? `<div class="d-note">${esc(day.note)}</div>` : ''}
          ${wxBlockHtml(day.id)}
        </div>
      </div>` : `<div class="d-detail-body" style="padding-top:16px"><div class="d-detail-top">
        <div class="d-phase-tag" style="color:${color}">
          <span style="width:5px;height:5px;border-radius:50%;background:${color};display:inline-block"></span>
          ${esc(Ph[day.phase].label)}
        </div>
        <div class="d-ttl">${esc(day.title)}</div>
        <div class="d-date">${esc(day.date)}</div>
        ${day.note ? `<div class="d-note">${esc(day.note)}</div>` : ''}
        ${wxBlockHtml(day.id)}
      </div></div>`}
      <div class="d-detail-body">
      ${day.pontos.map(p => {
        const pColor = Ph[phaseKey(day, p)].color;
        const src = p.img ? escAttr(p.img) : '';
        const full = p.img ? escAttr(largePhoto(p.img)) : '';
        const vis = p.img
          ? `<div class="pcard-visual"><img class="pcard-img" src="${src}" alt="${escAttr(p.name)}" loading="lazy" width="640" height="360"/><button type="button" class="pcard-enlarge" aria-label="Ampliar foto"><span aria-hidden="true" style="font-size:18px;line-height:1;font-weight:300">+</span></button></div>`
          : '';
        return `<div class="pcard" data-lat="${p.lat}" data-lng="${p.lng}" data-fullimg="${full}" data-pname="${escAttr(p.name)}" tabindex="0" role="button">
          <div class="pcard-phase-bar" style="background:${pColor}"></div>
          ${vis}
          <div class="pcard-in">
            <div class="pname">
              <span style="width:5px;height:5px;border-radius:50%;background:${pColor};display:inline-block;flex-shrink:0"></span>
              ${esc(p.name)}
            </div>
            <div class="pinfo">${esc(p.info)}</div>
          </div>
        </div>`;
      }).join('')}
      </div>
    </div>`;

    body.querySelectorAll('.pcard').forEach(card => {
      const activate = () => {
        body.querySelectorAll('.pcard').forEach(c => c.classList.remove('on'));
        card.classList.add('on');
        map.flyTo([parseFloat(card.dataset.lat), parseFloat(card.dataset.lng)], 12, { duration:1.2 });
      };
      card.addEventListener('click', activate);
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activate(); } });
      const z = card.querySelector('.pcard-enlarge');
      if (z) {
        z.addEventListener('click', e => {
          e.stopPropagation();
          const u = card.dataset.fullimg;
          if (u) openLightbox(u, card.dataset.pname || '');
        });
        z.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.stopPropagation();
            e.preventDefault();
            z.click();
          }
        });
      }
    });
    var wxEl = body.querySelector('.d-wx[data-wx-day="' + day.id + '"]');
    fillWxDetailEl(wxEl, day.id);
  }

  const pts = day.pontos.filter(p => p.lat > -36 && p.lng > 15);
  if (pts.length === 1) {
    map.flyTo([pts[0].lat, pts[0].lng], 10, { duration:1.2 });
  } else if (pts.length > 1) {
    const lats = pts.map(p => p.lat), lngs = pts.map(p => p.lng);
    map.flyToBounds(
      L.latLngBounds([[Math.min(...lats)-.4, Math.min(...lngs)-.4],[Math.max(...lats)+.4, Math.max(...lngs)+.4]]),
      { padding:[80,80], duration:1.2, maxZoom:12 }
    );
  }
}

(function() {
  const c = document.getElementById('pane-lista');
  c.innerHTML = ['safari','capetown','garden','extra'].map(ph => {
    const items = DAYS.flatMap(d => d.pontos
      .filter(p => phaseKey(d, p) === ph)
      .map(p => ({ ...p, lbl:d.label })));
    return `<div class="l-section ${ph}">${esc(Ph[ph].label)}</div>
      ${items.map(p => {
        const thumb = p.img
          ? `<img class="l-thumb" src="${escAttr(p.img)}" alt="" loading="lazy" width="56" height="56"/>`
          : `<div class="l-dot" style="background:${Ph[ph].color}"></div>`;
        return `<div class="l-item" data-lat="${p.lat}" data-lng="${p.lng}" tabindex="0" role="button">
          ${thumb}
          <div><div class="l-name">${esc(p.name)}</div><div class="l-meta">${esc(p.lbl)} · ${esc(p.info)}</div></div>
        </div>`;
      }).join('')}`;
  }).join('');
  c.querySelectorAll('.l-item').forEach(item => {
    const go = () => {
      const lat = parseFloat(item.dataset.lat), lng = parseFloat(item.dataset.lng);
      if (lat > -36 && lng > 15) map.flyTo([lat, lng], 12, { duration:1.2 });
    };
    item.addEventListener('click', go);
    item.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(); } });
  });
})();

function openLightbox(url, title) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  const cap = document.getElementById('lightbox-cap');
  img.src = url;
  img.alt = title ? title.replace(/<[^>]+>/g, '') : 'Foto do roteiro';
  cap.innerHTML = PHOTO_NOTE;
  lb.hidden = false;
  document.getElementById('lightbox-x').focus();
}

(function lightboxUi() {
  const lb = document.getElementById('lightbox');
  const x = document.getElementById('lightbox-x');
  const img = document.getElementById('lightbox-img');
  function close() {
    lb.hidden = true;
    img.src = '';
    img.alt = '';
  }
  x.addEventListener('click', close);
  lb.addEventListener('click', e => { if (e.target === lb) close(); });
  img.addEventListener('click', e => e.stopPropagation());
  document.addEventListener('keydown', e => { if (!lb.hidden && e.key === 'Escape') close(); });
})();

selectDay(DAYS[0].id);

Promise.all(DAYS.map(fetchOpenMeteoDay)).then(refreshVisibleWeather);
